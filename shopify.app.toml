# Staging Shopify app — PHP/Laravel dev workflow:
#
#   1. Start ngrok:           ngrok http 8000
#   2. Update APP_URL in .env to the new ngrok URL
#   3. Update the ngrok URL below, then run:
#                             shopify app dev --config=staging --tunnel-url=https://xxx.ngrok-free.app:443
#   4. Start PHP:             php artisan serve
#   5. Start Vite:            npm run dev
#
# Keep shopify.app.production.toml pointing at PROD — never run without --config=staging.

client_id = "581a170edca607affc7a878b55c6eee0"
name = "PromptForm (Staging)"
application_url = "https://84eb-182-185-80-23.ngrok-free.app/auth/shopify/begin"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "bigdatashopgpttest.myshopify.com"

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  uri = "https://84eb-182-185-80-23.ngrok-free.app/api/shopify/webhooks"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "https://84eb-182-185-80-23.ngrok-free.app/api/shopify/webhooks"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "https://84eb-182-185-80-23.ngrok-free.app/api/shopify/webhooks"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://84eb-182-185-80-23.ngrok-free.app/api/shopify/webhooks"

[access_scopes]
scopes = ""

[auth]
redirect_urls = [
  "https://84eb-182-185-80-23.ngrok-free.app/auth/shopify/callback",
  "https://84eb-182-185-80-23.ngrok-free.app/auth/shopify/billing/callback"
]
