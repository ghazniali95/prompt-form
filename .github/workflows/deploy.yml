name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build admin frontend
        run: npm run build

      - name: Build storefront widget
        run: npm run build:widget

      - name: Sync files to server via rsync
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -az --delete \
            --chmod=D755,F644 \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/1077226.cloudwaysapps.com/hkhrtsgerr/public_html/

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/1077226.cloudwaysapps.com/hkhrtsgerr/public_html
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart
